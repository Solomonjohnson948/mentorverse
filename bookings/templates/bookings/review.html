{% extends 'bookings/base.html' %}

{% block content %}

<div class="container">
    <div class="card">

        <h1>Leave a Review ⭐</h1>

        <p>
            Share your experience with
            <strong>{{ booking.mentor.name }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            <label>Rating</label>
            {{ form.rating }}

            <label>Comment</label>
            {{ form.comment }}

            <button type="submit" class="book-btn">
                Submit Review →
            </button>
        </form>

    </div>
</div>

{% endblock %}
