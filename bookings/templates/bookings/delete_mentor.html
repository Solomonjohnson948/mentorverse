{% extends 'bookings/admin_base.html' %}

{% block content %}

<div class="container">
    <h1>Delete Mentor</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ mentor.name }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit"
                class="book-btn">
            Yes, Delete
        </button>
    </form>
</div>

{% endblock %}
