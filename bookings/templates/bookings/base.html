{% load static %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <title>MentorVerse | Find Mentors. Build Dreams.</title>
</head>

<body>

<nav class="navbar">

    <div class="logo">
        🌌 MentorVerse
    </div>

    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/book/">Mentors</a></li>
        <li><a href="/about/">About</a></li>
    </ul>

    <div class="auth-buttons">
        {% if user.is_authenticated %}
            <a href="/dashboard/" class="login-btn">Dashboard</a>
            <a href="/logout/" class="signup-btn">Logout</a>
        {% else %}
            <a href="/login/" class="login-btn">Login</a>
            <a href="/signup/" class="signup-btn">Sign Up</a>
        {% endif %}
    </div>

</nav>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer style="text-align:center; padding:40px; color:#94a3b8;">
    © 2026 MentorVerse. Built for ambitious learners.
</footer>

</body>
</html>
