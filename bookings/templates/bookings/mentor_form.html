{% extends 'bookings/admin_base.html' %}

{% block content %}

<div class="container">
    <div class="card">

        <h1>{{ title }}</h1>
        <p>Create or update a mentor profile.</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="book-btn">
                Save Mentor →
            </button>
        </form>

    </div>
</div>

{% endblock %}
